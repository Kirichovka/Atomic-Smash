<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atomic Smash Lab</title>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body data-page="game">
    <div id="game-screen" class="app-screen">
        <aside id="sidebar" class="palette-sidebar">
            <div id="sidebar-content"></div>
            <button id="sidebar-resize-handle" class="sidebar-resize-handle" type="button" tabindex="-1" aria-label="Resize palette"></button>
        </aside>

        <main id="workspace">
            <div id="topbar"></div>

            <div id="mix-zone">
                <svg id="connections-layer" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
            </div>

            <div id="tutorial-overlay" class="tutorial-overlay hidden" aria-hidden="true">
                <div id="tutorial-highlight" class="tutorial-highlight"></div>
                <div id="tutorial-highlight-secondary" class="tutorial-highlight tutorial-highlight-secondary hidden"></div>
                <div id="tutorial-arrow" class="tutorial-arrow hidden" aria-hidden="true">&#8594;</div>
                <div id="tutorial-bubble" class="tutorial-bubble">
                    <div id="tutorial-bubble-text" class="tutorial-bubble-text"></div>
                    <button id="tutorial-bubble-action" class="tutorial-bubble-action hidden" type="button"></button>
                </div>
            </div>

            <div id="mix-zone-context-root" class="mix-zone-context hidden" aria-hidden="true">
                <button
                    id="mix-zone-context-backdrop"
                    class="mix-zone-context-backdrop"
                    type="button"
                    tabindex="-1"
                    aria-label="Close mix zone menu"
                ></button>

                <div id="mix-zone-context-menu" class="mix-zone-context-menu" role="menu" aria-label="Mix zone actions"></div>

                <section id="mix-zone-picker" class="mix-zone-picker hidden" aria-label="Choose element">
                    <div id="mix-zone-picker-list" class="mix-zone-picker-list" role="menu" aria-label="Elements"></div>
                </section>
            </div>

            <section id="compound-zone"></section>
        </main>
    </div>

    <div id="element-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-backdrop" data-close-modal="true"></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="element-modal-title">
            <button id="element-modal-close" class="modal-close" type="button">Close</button>
            <div id="element-modal-content"></div>
        </div>
    </div>

    <div id="compound-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-backdrop" data-close-compound-modal="true"></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="compound-modal-title">
            <button id="compound-modal-close" class="modal-close" type="button">Close</button>
            <div id="compound-modal-content"></div>
        </div>
    </div>

    <div id="help-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-backdrop" data-close-help-modal="true"></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="help-modal-title">
            <button id="help-modal-close" class="modal-close" type="button">Close</button>
            <div id="help-modal-content"></div>
        </div>
    </div>

    <div id="valency-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-backdrop" data-close-valency-modal="true"></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="valency-modal-title">
            <button id="valency-modal-close" class="modal-close" type="button">Close</button>
            <div id="valency-modal-content"></div>
        </div>
    </div>

    <div id="theme-complete-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-backdrop" data-close-theme-complete-modal="true"></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="theme-complete-title">
            <button id="theme-complete-close" class="modal-close" type="button">Back To Themes</button>
            <div id="theme-complete-content"></div>
        </div>
    </div>

    <script type="module" src="./js/main.js?v=20260409-scene-schema"></script>
</body>
</html>
