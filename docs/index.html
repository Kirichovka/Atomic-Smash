<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atomic Smash Prototype</title>
    <link rel="stylesheet" href="./styles.css?v=20260409-home-map" />
</head>
<body data-page="menu">
    <section id="menu-screen" class="app-screen">
        <div class="menu-dynamic-bg pattern-bg" aria-hidden="true"></div>

        <header id="menu-header-root" class="home-header"></header>

        <div class="home-stage">
            <div class="home-stage-frame" id="menu-stage-frame">
                <div id="menu-toolbar-root" class="home-sheet-toolbar"></div>
                <div class="home-stage-grid" id="menu-scene-viewport">
                    <div class="home-stage-rule" aria-hidden="true"></div>
                    <svg id="menu-level-lines" class="home-map-lines" viewBox="0 0 1000 620" aria-hidden="true"></svg>
                    <div id="menu-level-map" class="home-level-map"></div>
                </div>
            </div>
        </div>
    </section>

    <div id="level-intro-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-backdrop" data-close-level-intro-modal="true"></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="level-intro-title">
            <button id="level-intro-close" class="modal-close" type="button">Close</button>
            <div id="level-intro-content"></div>
        </div>
    </div>

    <script type="module" src="./js/main.js?v=20260411-connection-revert"></script>
</body>
</html>
