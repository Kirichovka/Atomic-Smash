<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atomic Smash Prototype</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="menu">
    <section id="menu-screen" class="app-screen">
        <div class="menu-dynamic-bg pattern-bg" aria-hidden="true"></div>

        <header class="home-header">
            <a href="index.html" class="home-brand" aria-label="Atomic Smash home">
                <span class="home-brand-mark">&#9883;</span>
                <span class="home-brand-copy">
                    <strong>Atomic Smash</strong>
                    <span>Chemistry sandbox</span>
                </span>
            </a>

            <div class="home-header-actions" aria-label="Header actions">
                <button class="home-icon-button" type="button" aria-label="Settings">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 3.75a2.1 2.1 0 0 1 2.06 1.67l.18.83a6.7 6.7 0 0 1 1.38.58l.74-.42a2.1 2.1 0 0 1 2.58.33l.72.72a2.1 2.1 0 0 1 .33 2.58l-.42.74c.23.44.43.9.58 1.38l.83.18A2.1 2.1 0 0 1 20.25 12a2.1 2.1 0 0 1-1.67 2.06l-.83.18a6.7 6.7 0 0 1-.58 1.38l.42.74a2.1 2.1 0 0 1-.33 2.58l-.72.72a2.1 2.1 0 0 1-2.58.33l-.74-.42a6.7 6.7 0 0 1-1.38.58l-.18.83A2.1 2.1 0 0 1 12 20.25a2.1 2.1 0 0 1-2.06-1.67l-.18-.83a6.7 6.7 0 0 1-1.38-.58l-.74.42a2.1 2.1 0 0 1-2.58-.33l-.72-.72a2.1 2.1 0 0 1-.33-2.58l.42-.74a6.7 6.7 0 0 1-.58-1.38l-.83-.18A2.1 2.1 0 0 1 3.75 12a2.1 2.1 0 0 1 1.67-2.06l.83-.18c.15-.48.35-.94.58-1.38l-.42-.74a2.1 2.1 0 0 1 .33-2.58l.72-.72a2.1 2.1 0 0 1 2.58-.33l.74.42c.44-.23.9-.43 1.38-.58l.18-.83A2.1 2.1 0 0 1 12 3.75Z" />
                        <circle cx="12" cy="12" r="2.85" />
                    </svg>
                </button>

                <button class="home-icon-button home-icon-button-profile" type="button" aria-label="Profile">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 12.25a4.25 4.25 0 1 0 0-8.5 4.25 4.25 0 0 0 0 8.5Z" />
                        <path d="M4.5 19.25a7.5 7.5 0 0 1 15 0" />
                    </svg>
                </button>
            </div>
        </header>

        <div class="home-stage">
            <div class="home-stage-frame">
                <div class="home-stage-grid" aria-hidden="true"></div>
                <div class="home-stage-rule" aria-hidden="true"></div>

                <svg class="home-map-lines" viewBox="0 0 1000 620" preserveAspectRatio="none" aria-hidden="true">
                    <path d="M500 118 C465 160 405 197 336 234" />
                    <path d="M336 282 C302 337 280 392 254 456" />
                    <path d="M336 282 C368 338 404 394 438 452" />
                    <path d="M500 118 C554 172 602 218 646 276" />
                    <path d="M646 314 C684 372 720 428 756 468" />
                </svg>

                <div class="home-map">
                    <button id="menu-themes-btn" class="home-node home-node-root" type="button">
                        <span class="home-node-label">Enter Lab</span>
                        <span class="home-node-title">Theme Missions</span>
                    </button>

                    <div class="home-node home-node-status home-node-theme">
                        <span class="home-node-label">Theme progress</span>
                        <span id="menu-theme-progress" class="home-node-meta">0/0 themes complete</span>
                    </div>

                    <div class="home-node home-node-note home-node-route">
                        <span class="home-node-label">Current route</span>
                        <span class="home-node-title">Basic path</span>
                    </div>

                    <button id="menu-journal-btn" class="home-node home-node-action home-node-journal" type="button">
                        <span class="home-node-label">Archive</span>
                        <span class="home-node-title">Journal</span>
                        <span id="menu-journal-progress" class="home-node-meta">0 discovered compounds</span>
                    </button>

                    <button id="menu-continue-btn" class="home-node home-node-action home-node-continue" type="button">
                        <span class="home-node-label">Resume</span>
                        <span class="home-node-title">Continue</span>
                    </button>

                    <div class="home-node home-node-status home-node-current">
                        <span class="home-node-label">Current theme</span>
                        <span id="menu-current-theme" class="home-node-meta">No active theme yet</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
